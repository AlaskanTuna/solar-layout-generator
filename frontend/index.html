<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Work+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>SolarSim — Rooftop Solar Assessment for Malaysia</title>
    <meta
      name="description"
      content="Search any Malaysian address, generate a panel layout on your real rooftop, and get a NEM-accurate savings report in 90 seconds. Free preliminary assessment grounded in Google Solar API and post-July 2025 TNB tariffs."
    />

    <!-- Open Graph (Facebook, WhatsApp, Discord, Slack, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SolarSim" />
    <meta property="og:title" content="SolarSim — Rooftop Solar Assessment for Malaysia" />
    <meta
      property="og:description"
      content="Search any Malaysian address, generate a panel layout on your real rooftop, and get a NEM-accurate savings report in 90 seconds."
    />
    <meta property="og:url" content="https://solarsim.tech/" />
    <meta property="og:image" content="https://solarsim.tech/og-banner.webp" />
    <meta property="og:image:width" content="1812" />
    <meta property="og:image:height" content="868" />
    <meta property="og:image:alt" content="SolarSim — interactive rooftop solar assessment for Malaysian homeowners" />
    <meta property="og:locale" content="en_MY" />
    <meta property="og:locale:alternate" content="ms_MY" />
    <meta property="og:locale:alternate" content="zh_MY" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SolarSim — Rooftop Solar Assessment for Malaysia" />
    <meta
      name="twitter:description"
      content="Search any Malaysian address, generate a panel layout on your real rooftop, and get a NEM-accurate savings report in 90 seconds."
    />
    <meta name="twitter:image" content="https://solarsim.tech/og-banner.webp" />
    <meta name="twitter:image:alt" content="SolarSim — interactive rooftop solar assessment for Malaysian homeowners" />

    <!-- Theme color (browser chrome on Android, address bar on Safari) -->
    <meta name="theme-color" content="#ea580c" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1c1917" media="(prefers-color-scheme: dark)" />
    <script>
      // Prevent FOUC: apply dark class before first paint
      ;(function () {
        var theme = localStorage.getItem('theme')
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
