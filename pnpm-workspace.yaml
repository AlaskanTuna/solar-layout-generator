packages:
  - 'shared'
  - 'backend'
  - 'frontend'
  # Keep the Vercel PDF service outside the pnpm workspace so its deploy stays isolated
  # from monorepo install/link behavior; root lint/typecheck scripts validate it explicitly.
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  core-js: true
  esbuild: true
  prisma: true
  sharp: true
